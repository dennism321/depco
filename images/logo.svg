<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-label="Comfort Depco Solutions">
  <defs>
    <style>
      .txt-comfort  { font: 700 italic 38px 'Arial Black', 'Arial Bold', Arial, sans-serif; fill: #1a1a1a; }
      .txt-depco    { font: 900 110px 'Arial Black', 'Arial Bold', Arial, sans-serif; fill: #1a1a1a; letter-spacing: -2px; }
      .txt-solutions{ font: 700 italic 36px 'Arial Black', 'Arial Bold', Arial, sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- Blue swoosh — left side, sweeping lower-left to upper-center -->
  <path d="
    M 52,272
    C 24,240  10,195  14,148
    C 18,100  42,58   90,34
    C 110,24  135,18  158,18
    L 150,42
    C 132,40  112,48  95,60
    C 58,84   40,120  40,162
    C 40,202  52,236  68,260
    Z
  " fill="#1565C0"/>

  <!-- Red swoosh — right side, sweeping upper-right to lower-right -->
  <path d="
    M 362,18
    C 388,18  414,28  433,48
    C 470,86  480,140 472,192
    C 464,240 440,272 406,286
    L 400,262
    C 426,250 444,222 450,192
    C 458,148 446,96  416,62
    C 400,44  380,34  360,34
    Z
  " fill="#CC0000"/>

  <!-- "Comfort" text -->
  <text x="108" y="92" class="txt-comfort">Comfort</text>

  <!-- "DEPCO" text -->
  <text x="64" y="200" class="txt-depco">DEPCO</text>

  <!-- "Solutions" text -->
  <text x="238" y="254" class="txt-solutions">Solutions</text>
</svg>
